<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Classifier</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark">

    <header>
        <div class="header-content">
            <div class="header-left">
                <svg class="heart-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21C12 21 3 14 3 8C3 5.239 5.239 3 8 3C9.657 3 11.121 3.799 12 5.025C12.879 3.799 14.343 3 16 3C18.761 3 21 5.239 21 8C21 14 12 21 12 21Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
                <div>
                    <h1>Heart Disease Classifier</h1>
                    <p class="subtitle">Sistema de predição de risco cardíaco baseado em machine learning</p>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                <svg id="moonIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
                <svg id="sunIcon" style="display:none" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
                    <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </header>

    <main>

        <!-- Formulário -->
        <section class="card form-card">
            <h2>Dados do Paciente</h2>
            <p class="section-desc">Preencha os dados clínicos do paciente para obter a predição de risco cardíaco.</p>

            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Nome do Paciente</label>
                    <input type="text" id="name" placeholder="Ex: Maria Silva">
                </div>
                <div class="form-group">
                    <label for="age">Idade (anos)</label>
                    <input type="number" id="age" placeholder="Ex: 52" min="1" max="120">
                </div>
                <div class="form-group">
                    <label for="sex">Sexo</label>
                    <select id="sex">
                        <option value="">Selecione</option>
                        <option value="1">Masculino</option>
                        <option value="0">Feminino</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cp">Tipo de Dor no Peito</label>
                    <select id="cp">
                        <option value="">Selecione</option>
                        <option value="0">Angina típica</option>
                        <option value="1">Angina atípica</option>
                        <option value="2">Dor não anginosa</option>
                        <option value="3">Assintomático</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="trestbps">Pressão Arterial em Repouso (mmHg)</label>
                    <input type="number" id="trestbps" placeholder="Ex: 120" min="50" max="300">
                </div>
                <div class="form-group">
                    <label for="chol">Colesterol Sérico (mg/dl)</label>
                    <input type="number" id="chol" placeholder="Ex: 200" min="50" max="700">
                </div>
                <div class="form-group">
                    <label for="fbs">Glicemia em Jejum > 120 mg/dl</label>
                    <select id="fbs">
                        <option value="">Selecione</option>
                        <option value="1">Sim</option>
                        <option value="0">Não</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="restecg">Eletrocardiograma em Repouso</label>
                    <select id="restecg">
                        <option value="">Selecione</option>
                        <option value="0">Normal</option>
                        <option value="1">Anormalidade ST-T</option>
                        <option value="2">Hipertrofia ventricular esquerda</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="thalach">Frequência Cardíaca Máxima</label>
                    <input type="number" id="thalach" placeholder="Ex: 150" min="50" max="250">
                </div>
                <div class="form-group">
                    <label for="exang">Angina Induzida por Exercício</label>
                    <select id="exang">
                        <option value="">Selecione</option>
                        <option value="1">Sim</option>
                        <option value="0">Não</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="oldpeak">Depressão do Segmento ST</label>
                    <input type="number" id="oldpeak" placeholder="Ex: 1.0" min="0" max="10" step="0.1">
                </div>
                <div class="form-group">
                    <label for="slope">Inclinação do Segmento ST</label>
                    <select id="slope">
                        <option value="">Selecione</option>
                        <option value="0">Ascendente</option>
                        <option value="1">Plano</option>
                        <option value="2">Descendente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ca">Vasos Principais (fluoroscopia)</label>
                    <select id="ca">
                        <option value="">Selecione</option>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="thal">Teste de Talassemia</label>
                    <select id="thal">
                        <option value="">Selecione</option>
                        <option value="1">Normal</option>
                        <option value="2">Defeito fixo</option>
                        <option value="3">Defeito reversível</option>
                    </select>
                </div>
            </div>

            <button class="btn-primary" onclick="submitForm()">Analisar Risco Cardíaco</button>
        </section>

        <!-- Card de resultado -->
        <section class="card result-card" id="resultCard" style="display:none">
            <div class="result-content" id="resultContent"></div>
        </section>

        <!-- Tabela de histórico -->
        <section class="card table-card">
            <div class="table-header">
                <h2>Histórico de Pacientes</h2>
            </div>
            <div class="table-wrapper">
                <table id="patientsTable">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Idade</th>
                            <th>Sexo</th>
                            <th>Pressão</th>
                            <th>Colesterol</th>
                            <th>FC Máxima</th>
                            <th>Diagnóstico</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="scripts.js"></script>
</body>
</html>
